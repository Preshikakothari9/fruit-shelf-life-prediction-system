{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block body %}
<div class="auth-wrapper">
  <div class="auth-card glass">
    <div class="brand">
      <span class="brand-icon">🍎</span>
      <h1>FruitFresh</h1>
      <p>Antigravity Predictor</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
      <div class="form-floating">
        <input type="text" id="username" name="username" placeholder=" " required autocomplete="username">
        <label for="username">Username</label>
      </div>
      <div class="form-floating">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
        <label for="password">Password</label>
      </div>
      <button type="submit" class="btn-glow" id="btn-login">Sign In</button>
    </form>

    <div style="text-align:center; margin-top:1.2rem;">
      <a href="{{ url_for('auth.register') }}" class="btn-ghost">Create an account →</a>
    </div>
  </div>
</div>
{% endblock %}
